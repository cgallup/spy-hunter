<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Spy Hunter</title>
<style>
  html, body {
    margin: 0;
    height: 100vh;
    height: 100dvh;
    background: #000;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: 'Courier New', monospace;
    overscroll-behavior: none;
    overflow-y: auto;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;
  }
  #wrap {
    text-align: center;
    color: #0f0;
    width: 100%;
    max-width: 480px;
    padding: 6px 8px;
    box-sizing: border-box;
  }
  .canvas-box {
    position: relative;
    width: 100%;
  }
  canvas {
    background: #1a5c1a;
    border: 2px solid #0f0;
    image-rendering: pixelated;
    display: block;
    width: 100%;
    max-width: 480px;
    height: auto;
    max-height: 58vh;
    max-height: 58dvh;
    aspect-ratio: 480 / 800;
    touch-action: none;
    margin: 0 auto;
  }
  #hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin: 0 auto 6px;
    font-size: 15px;
    letter-spacing: 1px;
  }
  #msg {
    position: absolute;
    color: #0f0;
    font-size: 22px;
    text-align: center;
    width: 100%;
    top: 40%;
    pointer-events: none;
  }
  #banner {
    position: absolute;
    color: #ff0;
    font-size: 14px;
    text-align: center;
    width: 100%;
    top: 10px;
    pointer-events: none;
    text-shadow: 1px 1px 2px #000;
  }
  #hint {
    color: #0a0;
    font-size: 11px;
    margin-top: 4px;
  }
  #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
  }
  #controls .side {
    display: flex;
    gap: 10px;
  }
  .sub-row {
    display: flex;
    gap: 8px;
  }
  .ctrl-btn {
    font-family: inherit;
    font-size: 22px;
    color: #0f0;
    background: #001a00;
    border: 2px solid #0f0;
    border-radius: 10px;
    width: 62px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn:active, .ctrl-btn.active {
    background: #0f0;
    color: #000;
  }
  #fireBtn { width: 100%; font-size: 15px; }
  #oilBtn { width: 78px; font-size: 12px; }
  #weaponBtn { width: 78px; font-size: 11px; }
  .btn-col { display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <span id="score">SCORE: 0</span>
    <span id="weapon">WPN: MG</span>
    <span id="lives">LIVES: 3</span>
  </div>
  <div class="canvas-box">
    <canvas id="game" width="480" height="800"></canvas>
    <div id="banner"></div>
    <div id="msg"></div>
  </div>
  <div id="hint">ARROWS/A-D steer &nbsp;•&nbsp; SPACE fire &nbsp;•&nbsp; O oil &nbsp;•&nbsp; S smoke &nbsp;•&nbsp; X missile &nbsp;•&nbsp; P pause &nbsp;•&nbsp; M mute</div>
  <div id="controls">
    <div class="side">
      <button class="ctrl-btn" id="leftBtn">&#9664;</button>
      <button class="ctrl-btn" id="rightBtn">&#9654;</button>
    </div>
    <div class="btn-col">
      <button class="ctrl-btn" id="fireBtn">FIRE</button>
      <div class="sub-row">
        <button class="ctrl-btn" id="oilBtn">OIL</button>
        <button class="ctrl-btn" id="weaponBtn">SPEC</button>
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const weaponEl = document.getElementById('weapon');
const msgEl = document.getElementById('msg');
const bannerEl = document.getElementById('banner');

const W = canvas.width, H = canvas.height;

// ---------- Input ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  if (e.code === 'KeyP') togglePause();
  if (e.code === 'KeyM') toggleMute();
  if (e.code === 'KeyO') fireOil();
  if (e.code === 'KeyS') fireSpecial('smoke');
  if (e.code === 'KeyX') fireSpecial('missile');
  if (e.code === 'Enter' && state === 'gameover') resetGame();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

function bindButton(el, code, onPress) {
  const press = e => { e.preventDefault(); keys[code] = true; el.classList.add('active'); if (onPress) onPress(); };
  const release = e => { e.preventDefault(); keys[code] = false; el.classList.remove('active'); };
  el.addEventListener('pointerdown', press);
  el.addEventListener('pointerup', release);
  el.addEventListener('pointercancel', release);
  el.addEventListener('pointerleave', release);
  el.addEventListener('contextmenu', e => e.preventDefault());
}
bindButton(document.getElementById('leftBtn'), 'ArrowLeft');
bindButton(document.getElementById('rightBtn'), 'ArrowRight');
bindButton(document.getElementById('fireBtn'), 'Space');
bindButton(document.getElementById('oilBtn'), 'KeyO_touch', () => fireOil());
bindButton(document.getElementById('weaponBtn'), 'KeyX_touch', () => useHeldSpecial());

// ---------- Music ----------
const MUSIC_VOLUME = 0.16;
const TEMPO = 150; // bpm
const SEC_PER_BEAT = 60 / TEMPO;

function noteFreq(note) {
  const SEMITONES = { C: -9, 'C#': -8, D: -7, 'D#': -6, E: -5, F: -4, 'F#': -3, G: -2, 'G#': -1, A: 0, 'A#': 1, B: 2 };
  const m = note.match(/^([A-G]#?)(\d)$/);
  const semis = SEMITONES[m[1]] + (parseInt(m[2], 10) - 4) * 12;
  return 440 * Math.pow(2, semis / 12);
}

// One 16-beat (4-bar) melodic loop over an Em - C - G - D progression.
const LEAD = [
  ['E4', 0.5], ['G4', 0.5], ['B4', 0.5], ['E5', 0.5],
  ['D5', 0.5], ['B4', 0.5], ['G4', 0.5], ['B4', 0.5],
  ['C5', 0.5], ['B4', 0.5], ['A4', 0.5], ['G4', 0.5],
  ['F#4', 0.5], ['G4', 0.5], ['A4', 0.5], ['B4', 0.5],
  ['A4', 0.5], ['G4', 0.5], ['F#4', 0.5], ['E4', 0.5],
  ['G4', 0.5], ['B4', 0.5], ['E5', 1],
  ['D5', 0.5], ['C5', 0.5], ['B4', 0.5], ['A4', 0.5],
  ['G4', 0.5], ['F#4', 0.5], ['E4', 1],
];
const BASS = [];
(function buildBass() {
  const roots = ['E2', 'C2', 'G2', 'D2'];
  roots.forEach(root => {
    const letter = root.slice(0, -1);
    const octUp = letter + (parseInt(root.slice(-1), 10) + 1);
    for (let i = 0; i < 4; i++) {
      BASS.push([root, 0.5]);
      BASS.push([i === 2 ? octUp : root, 0.5]);
    }
  });
})();

let audioCtx = null;
let musicGain = null;
let musicMuted = false;
let leadIdx = 0, leadTime = 0;
let bassIdx = 0, bassTime = 0;
let schedulerHandle = null;

function playNote(freq, time, dur, type, peak) {
  const osc = audioCtx.createOscillator();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, time);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, time);
  g.gain.linearRampToValueAtTime(peak, time + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, time + dur);
  osc.connect(g);
  g.connect(musicGain);
  osc.start(time);
  osc.stop(time + dur + 0.02);
}

function schedulerTick() {
  const lookahead = 0.15;
  const now = audioCtx.currentTime;
  while (leadTime < now + lookahead) {
    const [note, beats] = LEAD[leadIdx];
    const dur = beats * SEC_PER_BEAT;
    playNote(noteFreq(note), leadTime, dur * 0.85, 'triangle', 0.10);
    leadTime += dur;
    leadIdx = (leadIdx + 1) % LEAD.length;
  }
  while (bassTime < now + lookahead) {
    const [note, beats] = BASS[bassIdx];
    const dur = beats * SEC_PER_BEAT;
    playNote(noteFreq(note), bassTime, dur * 0.8, 'square', 0.07);
    bassTime += dur;
    bassIdx = (bassIdx + 1) % BASS.length;
  }
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain();
  musicGain.gain.value = musicMuted ? 0 : MUSIC_VOLUME;
  musicGain.connect(audioCtx.destination);
  leadTime = audioCtx.currentTime + 0.1;
  bassTime = leadTime;
  schedulerHandle = setInterval(schedulerTick, 50);
}

function toggleMute() {
  musicMuted = !musicMuted;
  if (musicGain) musicGain.gain.value = musicMuted ? 0 : MUSIC_VOLUME;
}

window.addEventListener('keydown', initAudio, { once: true });
window.addEventListener('pointerdown', initAudio, { once: true });

canvas.addEventListener('pointerdown', () => {
  if (state === 'gameover') resetGame();
});

// ---------- Game State ----------
let state = 'playing'; // playing | paused | gameover
let score = 0;
let lives = 3;
let distance = 0;
let baseSpeed = 3.4;

// ---------- Road ----------
const TRANSITION = 220;
const SEG_PARAMS = {
  road:  { numChannels: 1, channelWidth: 120, gap: 0,  kindMix: 0 },
  fork:  { numChannels: 2, channelWidth: 76,  gap: 40, kindMix: 0 },
  water: { numChannels: 1, channelWidth: 150, gap: 0,  kindMix: 1 },
};
const RAW_PATTERN = [
  { type: 'road',  len: 2600 },
  { type: 'fork',  len: 1100 },
  { type: 'road',  len: 1900 },
  { type: 'water', len: 1300 },
  { type: 'road',  len: 2400 },
];
let patternArr = [];
let cycleLen = 0;
(function buildPattern() {
  let acc = 0;
  for (const seg of RAW_PATTERN) {
    patternArr.push({ type: seg.type, start: acc, end: acc + seg.len });
    acc += seg.len;
  }
  cycleLen = acc;
})();

function roadCenterX(d) {
  return W / 2 + Math.sin(d * 0.0010) * 80 + Math.sin(d * 0.00033 + 2.1) * 35;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function findSegIndex(m) {
  for (let i = 0; i < patternArr.length; i++) {
    if (m >= patternArr[i].start && m < patternArr[i].end) return i;
  }
  return 0;
}

function blendParams(from, to, t) {
  return {
    numChannels: t < 0.5 ? from.numChannels : to.numChannels,
    channelWidth: lerp(from.channelWidth, to.channelWidth, t),
    gap: lerp(from.gap, to.gap, t),
    kindMix: lerp(from.kindMix, to.kindMix, t),
  };
}

function terrainParamsAt(d) {
  let cyclePos = ((d % cycleLen) + cycleLen) % cycleLen;
  let idx = findSegIndex(cyclePos);
  let seg = patternArr[idx];
  let lenSeg = seg.end - seg.start;
  let into = cyclePos - seg.start;
  let remain = lenSeg - into;
  let curP = SEG_PARAMS[seg.type];
  if (lenSeg > TRANSITION * 2) {
    if (into < TRANSITION) {
      let prevSeg = patternArr[(idx - 1 + patternArr.length) % patternArr.length];
      let prevP = SEG_PARAMS[prevSeg.type];
      return blendParams(prevP, curP, into / TRANSITION);
    } else if (remain < TRANSITION) {
      let nextSeg = patternArr[(idx + 1) % patternArr.length];
      let nextP = SEG_PARAMS[nextSeg.type];
      return blendParams(nextP, curP, remain / TRANSITION);
    }
  }
  return curP;
}

// returns array of {cx, half} channel centers (offsets from road center already applied)
function getChannels(d) {
  const params = terrainParamsAt(d);
  const center = roadCenterX(d);
  const half = params.channelWidth / 2;
  if (params.numChannels < 1.5) {
    return { params, channels: [{ cx: center, half, offset: 0 }] };
  }
  const leftCx = center - params.gap / 2 - half;
  const rightCx = center + params.gap / 2 + half;
  return { params, channels: [
    { cx: leftCx, half, offset: leftCx - center },
    { cx: rightCx, half, offset: rightCx - center },
  ] };
}

function deviationFromRoad(x, d) {
  const { channels } = getChannels(d);
  let best = Infinity;
  for (const ch of channels) {
    const dev = Math.abs(x - ch.cx) - ch.half;
    if (dev < best) best = dev;
  }
  return best; // <=0 means on-road
}

// ---------- Player ----------
const player = {
  w: 28, h: 48,
  x: W / 2,
  y: H - 150,
  speed: 6.4,
  cooldown: 0,
  invuln: 0,
  offRoadTimer: 0,
  special: null, // 'smoke' | 'missile' (van pickup)
  specialAmmo: 0,
  boat: false,
};
let oilCooldown = 0;

function screenYForAnchor(anchor) { return player.y + (distance - anchor); }

// ---------- Entities ----------
let playerBullets = [];
let enemyBullets = [];
let traffic = [];   // ahead cars: civilians, agents, van
let chasers = [];   // cars approaching from behind
let hazards = [];   // oil slicks / smoke screens
let particles = [];

let trafficTimer = 60;
let chaserTimer = 180;
let vanTimer = 700;
let banner = { text: '', timer: 0 };

function pickChannelOffset(anchor) {
  const { channels } = getChannels(anchor);
  const ch = channels[Math.floor(Math.random() * channels.length)];
  const jitter = (Math.random() * 0.5 - 0.25) * ch.half;
  return ch.offset + jitter;
}

function spawnTraffic() {
  const anchor = distance + player.y + 40;
  const roll = Math.random();
  let kind = 'civilian';
  if (roll < 0.22) kind = 'agent';
  traffic.push({
    kind,
    anchor,
    offset: pickChannelOffset(anchor),
    baseOffset: 0,
    forwardSpeed: 1.0 + Math.random() * 1.6,
    w: 26, h: 44,
    color: kind === 'agent' ? '#e03030' : ['#e0d840', '#40c0e0', '#e0e0e0', '#e08840'][Math.floor(Math.random() * 4)],
    fireTimer: kind === 'agent' ? 60 + Math.random() * 90 : Infinity,
    alive: true,
  });
}

function spawnChaser() {
  const anchor = distance - (H - player.y + 40);
  chasers.push({
    anchor,
    offset: pickChannelOffset(anchor),
    forwardSpeed: baseSpeed + 0.3 + Math.random() * 1.0,
    w: 26, h: 44,
    color: '#101010',
    alive: true,
  });
}

function spawnVan() {
  const anchor = distance + player.y + 40;
  traffic.push({
    kind: 'van',
    anchor,
    offset: pickChannelOffset(anchor),
    forwardSpeed: baseSpeed * 0.92,
    w: 28, h: 46,
    color: '#3050d0',
    alive: true,
    isVan: true,
    alongsideTimer: 0,
  });
}

function addParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 20 + Math.random() * 10,
      color,
    });
  }
}

function showBanner(text) {
  banner.text = text;
  banner.timer = 110;
}

const OIL_COOLDOWN_FRAMES = 50;

function fireOil() {
  if (state !== 'playing') return;
  if (oilCooldown > 0) return;
  hazards.push({
    kind: 'oil',
    anchor: distance - 40,
    offset: player.x - roadCenterX(distance),
    radius: 34,
    spawnDist: distance,
  });
  oilCooldown = OIL_COOLDOWN_FRAMES;
}

function fireSpecial(kind) {
  if (state !== 'playing') return;
  if (player.special !== kind || player.specialAmmo <= 0) {
    showBanner('NO ' + kind.toUpperCase() + ' — RAM THE VAN');
    return;
  }
  if (kind === 'missile') {
    playerBullets.push({ x: player.x - 4, y: player.y - player.h / 2, w: 8, h: 22, dy: -13, missile: true });
  } else {
    hazards.push({
      kind: 'smoke',
      anchor: distance - 40,
      offset: player.x - roadCenterX(distance),
      radius: 34,
      spawnDist: distance,
    });
  }
  player.specialAmmo--;
  if (player.specialAmmo <= 0) player.special = null;
  updateHud();
}

function useHeldSpecial() {
  if (!player.special) {
    showBanner('NO SPECIAL WEAPON — RAM THE VAN');
    return;
  }
  fireSpecial(player.special);
}

// ---------- Reset ----------
function resetGame() {
  score = 0;
  lives = 3;
  distance = 0;
  baseSpeed = 3.4;
  player.x = W / 2;
  player.cooldown = 0;
  player.invuln = 0;
  player.offRoadTimer = 0;
  player.special = null;
  player.specialAmmo = 0;
  player.boat = false;
  oilCooldown = 0;
  playerBullets = [];
  enemyBullets = [];
  traffic = [];
  chasers = [];
  hazards = [];
  particles = [];
  trafficTimer = 60;
  chaserTimer = 180;
  vanTimer = 700;
  banner.timer = 0;
  state = 'playing';
  msgEl.textContent = '';
  updateHud();
}

function updateHud() {
  scoreEl.textContent = 'SCORE: ' + score;
  livesEl.textContent = 'LIVES: ' + lives;
  const oilText = 'OIL:' + (oilCooldown > 0 ? Math.ceil(oilCooldown / 60) + 's' : 'RDY');
  const specialText = player.special ? ' ' + player.special.toUpperCase() + 'x' + player.specialAmmo : '';
  weaponEl.textContent = oilText + specialText;
}

function togglePause() {
  if (state === 'playing') {
    state = 'paused'; msgEl.textContent = 'PAUSED';
    if (audioCtx) audioCtx.suspend();
  } else if (state === 'paused') {
    state = 'playing'; msgEl.textContent = '';
    if (audioCtx) audioCtx.resume();
  }
}

function rectsOverlap(a, b) {
  return a.x - a.w / 2 < b.x + b.w / 2 && a.x + a.w / 2 > b.x - b.w / 2 &&
         a.y - a.h / 2 < b.y + b.h / 2 && a.y + a.h / 2 > b.y - b.h / 2;
}

// ---------- Update ----------
function update() {
  if (state !== 'playing') return;

  distance += baseSpeed;
  baseSpeed = Math.min(8.5, 3.4 + score * 0.0009);

  // terrain / boat check
  const curParams = terrainParamsAt(distance);
  player.boat = curParams.kindMix > 0.5;

  // steering
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
  player.x = Math.max(10, Math.min(W - 10, player.x));

  // off-road handling
  const dev = deviationFromRoad(player.x, distance);
  if (dev > 26) {
    if (player.invuln <= 0) crashPlayer();
    player.offRoadTimer = 0;
  } else if (dev > 0) {
    player.offRoadTimer++;
  } else {
    player.offRoadTimer = 0;
  }

  if (player.invuln > 0) player.invuln--;
  if (player.cooldown > 0) player.cooldown--;
  if (oilCooldown > 0) { oilCooldown--; updateHud(); }

  // machine gun fire
  if (keys['Space'] && player.cooldown === 0) {
    playerBullets.push({ x: player.x, y: player.y - player.h / 2, w: 4, h: 14, dy: -11 });
    player.cooldown = 12;
  }
  // touch special-weapon button uses a synthetic key that fires once via bindButton's onPress,
  // but also support holding KeyX on keyboard already handled in keydown listener.

  // move bullets
  playerBullets.forEach(b => b.y += b.dy);
  playerBullets = playerBullets.filter(b => b.y > -40);
  enemyBullets.forEach(b => b.y += 6);
  enemyBullets = enemyBullets.filter(b => b.y < H + 40);

  // spawn timers
  trafficTimer--; chaserTimer--; vanTimer--;
  const difficultyFactor = Math.max(0.4, 1 - score * 0.0006);
  const chaserDifficultyFactor = Math.max(0.6, 1 - score * 0.0004);
  if (trafficTimer <= 0) { spawnTraffic(); trafficTimer = (40 + Math.random() * 50) * difficultyFactor; }
  if (chaserTimer <= 0) { spawnChaser(); chaserTimer = (160 + Math.random() * 120) * chaserDifficultyFactor; }
  if (vanTimer <= 0) { spawnVan(); vanTimer = 650 + Math.random() * 300; }

  // update traffic (ahead cars)
  traffic.forEach(t => {
    t.anchor += t.forwardSpeed;
    t.y = screenYForAnchor(t.anchor);
    if (t.kind === 'agent') {
      const targetOffset = (player.x - roadCenterX(t.anchor));
      t.offset += (targetOffset - t.offset) * 0.015;
    }
    t.x = roadCenterX(t.anchor) + t.offset;
    if (t.kind === 'agent') {
      t.fireTimer--;
      if (t.fireTimer <= 0 && t.y > 0 && t.y < H) {
        enemyBullets.push({ x: t.x, y: t.y + t.h / 2, w: 4, h: 12 });
        t.fireTimer = 90 + Math.random() * 90;
      }
    }
    if (t.isVan) {
      const overlapX = Math.abs(t.x - player.x) < (t.w / 2 + player.w / 2 + 6);
      const overlapY = Math.abs(t.y - player.y) < (t.h / 2 + player.h / 2 + 10);
      if (overlapX && overlapY) {
        t.alongsideTimer = (t.alongsideTimer || 0) + 1;
        if (t.alongsideTimer > 30) {
          const weapons = ['smoke', 'missile'];
          const w = weapons[Math.floor(Math.random() * weapons.length)];
          player.special = w;
          player.specialAmmo = w === 'missile' ? 4 : 3;
          showBanner('WEAPON ACQUIRED: ' + w.toUpperCase());
          t.alive = false;
          updateHud();
        }
      }
    }
  });
  traffic = traffic.filter(t => t.alive && t.y < H + 60 && t.y > -60);

  // update chasers
  chasers.forEach(c => {
    c.anchor += c.forwardSpeed;
    c.y = screenYForAnchor(c.anchor);
    const targetOffset = (player.x - roadCenterX(c.anchor));
    c.offset += (targetOffset - c.offset) * 0.012;
    c.x = roadCenterX(c.anchor) + c.offset;
  });
  chasers = chasers.filter(c => c.alive && c.y < H + 80);

  // update hazards
  hazards.forEach(h => {
    h.y = screenYForAnchor(h.anchor);
    h.x = roadCenterX(h.anchor) + h.offset;
  });
  hazards = hazards.filter(h => h.y < H + 60);

  // update particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
  particles = particles.filter(p => p.life > 0);

  if (banner.timer > 0) banner.timer--;

  handleCollisions();
}

function crashPlayer() {
  lives--;
  updateHud();
  addParticles(player.x, player.y, '#ff6600');
  if (lives <= 0) {
    endGame();
  } else {
    player.invuln = 100;
    player.x = roadCenterX(distance);
  }
}

function handleCollisions() {
  // player bullets vs ahead traffic
  playerBullets.forEach(b => {
    for (const t of traffic) {
      if (!t.alive || t.isVan) continue;
      if (rectsOverlap(b, t)) {
        t.alive = false;
        b.hit = true;
        addParticles(t.x, t.y, t.kind === 'agent' ? '#ff4040' : '#cccccc');
        if (t.kind === 'agent') score += 40;
        else score = Math.max(0, score - 10);
        updateHud();
        break;
      }
    }
  });
  playerBullets = playerBullets.filter(b => !b.hit);

  // hazards vs chasers
  hazards.forEach(h => {
    for (const c of chasers) {
      if (!c.alive) continue;
      const dx = c.x - h.x, dy = c.y - h.y;
      if (Math.sqrt(dx * dx + dy * dy) < h.radius + 18) {
        c.alive = false;
        addParticles(c.x, c.y, h.kind === 'oil' ? '#222222' : '#aaaaaa');
        score += 25;
        updateHud();
      }
    }
  });

  // enemy bullets vs player
  if (player.invuln <= 0) {
    enemyBullets.forEach(b => {
      if (rectsOverlap(b, player)) {
        b.hit = true;
        crashPlayer();
      }
    });
  }
  enemyBullets = enemyBullets.filter(b => !b.hit);

  // player vs traffic / chasers (physical collision)
  if (player.invuln <= 0) {
    for (const t of traffic) {
      if (!t.alive || t.isVan) continue;
      if (rectsOverlap(player, t)) {
        t.alive = false;
        addParticles(t.x, t.y, '#ffaa00');
        crashPlayer();
        break;
      }
    }
    for (const c of chasers) {
      if (!c.alive) continue;
      if (rectsOverlap(player, c)) {
        c.alive = false;
        addParticles(c.x, c.y, '#ffaa00');
        crashPlayer();
        break;
      }
    }
  }
}

function endGame() {
  state = 'gameover';
  msgEl.innerHTML = 'GAME OVER<br><span style="font-size:14px">SCORE: ' + score + '<br>Press ENTER or tap to retry</span>';
}

// ---------- Draw ----------
const ROW_STEP = 8;

function drawRoad() {
  ctx.fillStyle = '#1a5c1a';
  ctx.fillRect(0, 0, W, H);
  for (let y = 0; y < H; y += ROW_STEP) {
    const d = distance + (player.y - y);
    const { params, channels } = getChannels(d);
    const shoulderColor = params.kindMix > 0.5 ? '#c2a05a' : '#3a3a3a';
    const roadColor = params.kindMix > 0.5 ? '#2a6fbf' : '#454545';

    if (params.numChannels < 1.5) {
      const ch = channels[0];
      ctx.fillStyle = shoulderColor;
      ctx.fillRect(ch.cx - ch.half - 22, y, 22, ROW_STEP);
      ctx.fillRect(ch.cx + ch.half, y, 22, ROW_STEP);
      ctx.fillStyle = roadColor;
      ctx.fillRect(ch.cx - ch.half, y, ch.half * 2, ROW_STEP);
      if (params.kindMix < 0.5) {
        if (Math.floor(d / 28) % 2 === 0) {
          ctx.fillStyle = '#e0e030';
          ctx.fillRect(ch.cx - 3, y, 6, ROW_STEP);
        }
      } else {
        if (Math.floor(d / 20) % 2 === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.35)';
          ctx.fillRect(ch.cx - ch.half + 6, y, ch.half * 2 - 12, 2);
        }
      }
    } else {
      const left = channels[0], right = channels[1];
      ctx.fillStyle = shoulderColor;
      ctx.fillRect(left.cx - left.half - 22, y, 22, ROW_STEP);
      ctx.fillRect(right.cx + right.half, y, 22, ROW_STEP);
      ctx.fillStyle = '#b02020';
      ctx.fillRect(left.cx + left.half, y, (right.cx - right.half) - (left.cx + left.half), ROW_STEP);
      ctx.fillStyle = roadColor;
      ctx.fillRect(left.cx - left.half, y, left.half * 2, ROW_STEP);
      ctx.fillRect(right.cx - right.half, y, right.half * 2, ROW_STEP);
    }
  }
}

function drawCar(x, y, w, h, color, isBoat) {
  ctx.fillStyle = color;
  if (isBoat) {
    ctx.beginPath();
    ctx.moveTo(x, y - h / 2);
    ctx.lineTo(x + w / 2, y - h / 4);
    ctx.lineTo(x + w / 2, y + h / 2);
    ctx.lineTo(x - w / 2, y + h / 2);
    ctx.lineTo(x - w / 2, y - h / 4);
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillRect(x - w / 2, y - h / 2, w, h);
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(x - w / 2 + 3, y - h / 2 + 6, w - 6, h * 0.35);
    ctx.fillStyle = '#111';
    ctx.fillRect(x - w / 2 - 2, y - h / 2 + 4, 3, h - 8);
    ctx.fillRect(x + w / 2 - 1, y - h / 2 + 4, 3, h - 8);
  }
}

function draw() {
  drawRoad();

  // hazards
  hazards.forEach(h => {
    ctx.fillStyle = h.kind === 'oil' ? 'rgba(20,20,20,0.85)' : 'rgba(200,200,200,0.55)';
    ctx.beginPath();
    ctx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
    ctx.fill();
  });

  // chasers
  chasers.forEach(c => drawCar(c.x, c.y, c.w, c.h, c.color, player.boat));

  // traffic
  traffic.forEach(t => drawCar(t.x, t.y, t.w, t.h, t.color, terrainParamsAt(t.anchor).kindMix > 0.5));

  // bullets
  ctx.fillStyle = '#fff';
  playerBullets.forEach(b => {
    ctx.fillStyle = b.missile ? '#ff5500' : '#ffffff';
    ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
  });
  ctx.fillStyle = '#ff0';
  enemyBullets.forEach(b => ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h));

  // particles
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life / 30);
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    ctx.globalAlpha = 1;
  });

  // player
  if (player.invuln <= 0 || Math.floor(player.invuln / 5) % 2 === 0) {
    drawCar(player.x, player.y, player.w, player.h, '#0f0', player.boat);
  }

  bannerEl.textContent = banner.timer > 0 ? banner.text : '';
}

// ---------- Loop ----------
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

resetGame();
loop();
</script>
